<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="form-container">
<h2>Login</h2>

<form onsubmit="return loginUser();">

</form>

<p id="loginMsg"></p>

</div>

<script src="js/script.js"></script>

</body>
</html>
